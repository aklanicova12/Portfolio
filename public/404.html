<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Anna Klanicová</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into a correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to render the correct page WITHOUT a reload.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.lastIndexOf('/')) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="text/javascript">
      // If the 404 is reached, redirect to index.html with the current path as a query param
      var path = window.location.pathname;
      window.location.replace('/' + (window.location.search ? window.location.search + '&' : '?') + '/' + path.slice(1));
    </script>
  </head>
  <body>
  </body>
</html>
